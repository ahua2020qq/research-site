<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --bg-card: #334155;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --accent-blue: #3B82F6;
      --accent-purple: #8B5CF6;
      --accent-green: #10B981;
      --accent-amber: #F59E0B;
      --accent-gray: #6B7280;
      --border-color: #475569;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 24px 16px;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 0 12px 24px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 24px;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .sidebar-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      padding-left: 52px;
    }

    .nav-section { margin-bottom: 24px; }

    .nav-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      padding: 0 12px;
      margin-bottom: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: var(--text-secondary);
    }

    .nav-item:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--accent-blue);
      color: white;
    }

    .nav-item-icon { font-size: 16px; }

    .nav-item-count {
      margin-left: auto;
      background: var(--bg-primary);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .admin-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      background: var(--bg-primary);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }

    .admin-link:hover {
      background: var(--accent-blue);
      color: white;
    }

    .main-content {
      flex: 1;
      margin-left: 280px;
      padding: 32px 48px;
      min-height: 100vh;
    }

    .page-header { margin-bottom: 32px; }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .page-desc {
      color: var(--text-secondary);
      font-size: 15px;
    }

    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }

    .search-input-wrapper {
      flex: 1;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border-color);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .entries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .entry-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
    }

    .entry-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-blue);
      box-shadow: 0 12px 40px rgba(59, 130, 246, 0.15);
    }

    .entry-card-preview {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      position: relative;
    }

    .entry-card-preview::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(0,0,0,0.2) 100%);
    }

    .entry-card-body { padding: 20px; }

    .entry-card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .entry-card-date {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .entry-card-category {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .entry-card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .entry-card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .entry-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .entry-tag {
      font-size: 11px;
      padding: 4px 8px;
      background: var(--bg-primary);
      border-radius: 6px;
      color: var(--text-secondary);
    }

    .category-ai-research { background: rgba(139, 92, 246, 0.2); color: #A78BFA; }
    .category-financial { background: rgba(16, 185, 129, 0.2); color: #34D399; }
    .category-engineering { background: rgba(59, 130, 246, 0.2); color: #60A5FA; }
    .category-reports { background: rgba(245, 158, 11, 0.2); color: #FBBF24; }
    .category-other { background: rgba(107, 114, 128, 0.2); color: #9CA3AF; }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-secondary);
      grid-column: 1 / -1;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

    @media (max-width: 1024px) {
      .sidebar { width: 240px; }
      .main-content { margin-left: 240px; padding: 24px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); z-index: 100; }
      .main-content { margin-left: 0; padding: 20px; }
      .entries-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">📊</div>
        <div class="sidebar-title">研究工作台</div>
      </div>
      <div class="sidebar-subtitle">AI & 工程实践 · 知识沉淀</div>
    </div>

    <nav class="nav-section">
      <div class="nav-label">快速导航</div>
      <a href="#" class="nav-item active" data-category="all">
        <span class="nav-item-icon">🏠</span>
        <span>全部成果</span>
        <span class="nav-item-count" id="countAll">0</span>
      </a>
    </nav>

    <nav class="nav-section">
      <div class="nav-label">主题分类</div>
      <div id="categoryNav"></div>
    </nav>

    <div class="sidebar-footer">
      <a href="admin.html" class="admin-link" target="_blank">
        <span>⚙️</span>
        <span>管理上传</span>
      </a>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title">研究成果</h1>
      <p class="page-desc">持续积累 · 深度研究 · 工程实践</p>
    </header>

    <div class="search-bar">
      <div class="search-input-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索研究成果...">
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">全部成果</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">本月新增</div>
        <div class="stat-value" id="statMonth">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">涉及主题</div>
        <div class="stat-value" id="statCategories">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">标签数量</div>
        <div class="stat-value" id="statTags">0</div>
      </div>
    </div>

    <div class="entries-grid" id="entriesGrid"></div>
  </main>

  <script>
    let siteData = { categories: [], entries: [] };
    let currentCategory = 'all';
    let searchQuery = '';

    async function loadData() {
      try {
        const response = await fetch('data.json');
        siteData = await response.json();
        init();
      } catch (e) {
        document.getElementById('entriesGrid').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-title">数据加载失败</div>
            <p>请确保 data.json 文件存在且可访问</p>
          </div>
        `;
      }
    }

    function init() {
      renderSidebar();
      renderStats();
      renderEntries();
      setupSearch();
    }

    function renderSidebar() {
      const nav = document.getElementById('categoryNav');
      nav.innerHTML = siteData.categories.map(cat => `
        <a href="#" class="nav-item" data-category="${cat.id}">
          <span class="nav-item-icon">${cat.icon}</span>
          <span>${cat.name}</span>
          <span class="nav-item-count">${siteData.entries.filter(e => e.category === cat.id).length}</span>
        </a>
      `).join('');

      nav.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          currentCategory = item.dataset.category;
          renderEntries();
        });
      });

      document.getElementById('countAll').textContent = siteData.entries.length;
    }

    function renderStats() {
      const now = new Date();
      const thisMonth = siteData.entries.filter(e => {
        const d = new Date(e.date);
        return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
      }).length;
      const allTags = new Set();
      siteData.entries.forEach(e => (e.tags || []).forEach(t => allTags.add(t)));

      document.getElementById('statTotal').textContent = siteData.entries.length;
      document.getElementById('statMonth').textContent = thisMonth;
      document.getElementById('statCategories').textContent = siteData.categories.length;
      document.getElementById('statTags').textContent = allTags.size;
    }

    function renderEntries() {
      const grid = document.getElementById('entriesGrid');
      let filtered = siteData.entries;

      if (currentCategory !== 'all') {
        filtered = filtered.filter(e => e.category === currentCategory);
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(e =>
          e.title.toLowerCase().includes(q) ||
          e.description.toLowerCase().includes(q) ||
          (e.tags || []).some(t => t.toLowerCase().includes(q))
        );
      }

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-title">暂无成果</div>
            <p>${searchQuery ? '没有找到匹配的研究成果' : '点击侧边栏"管理上传"添加第一个成果'}</p>
          </div>
        `;
        return;
      }

      filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

      grid.innerHTML = filtered.map(entry => {
        const cat = siteData.categories.find(c => c.id === entry.category) || { name: '其他', color: '#6B7280', icon: '📚' };
        return `
          <article class="entry-card" onclick="openEntry('${entry.file}')">
            <div class="entry-card-preview" style="background: linear-gradient(135deg, ${cat.color}20 0%, var(--bg-secondary) 100%);">
              ${cat.icon}
            </div>
            <div class="entry-card-body">
              <div class="entry-card-meta">
                <span class="entry-card-date">${formatDate(entry.date)}</span>
                <span class="entry-card-category category-${entry.category}">${cat.name}</span>
              </div>
              <h3 class="entry-card-title">${entry.title}</h3>
              <p class="entry-card-desc">${entry.description}</p>
              <div class="entry-card-tags">
                ${(entry.tags || []).slice(0, 4).map(tag => `<span class="entry-tag">${tag}</span>`).join('')}
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function openEntry(file) { window.open(file, '_blank'); }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function setupSearch() {
      const input = document.getElementById('searchInput');
      let timeout;
      input.addEventListener('input', (e) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          searchQuery = e.target.value.trim();
          renderEntries();
        }, 300);
      });
    }

    loadData();
  </script>
</body>
</html>
