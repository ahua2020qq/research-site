<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理上传 - 研究工作台</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --bg-card: #334155;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --accent-blue: #3B82F6;
      --accent-green: #10B981;
      --accent-red: #EF4444;
      --border-color: #475569;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 32px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
    }
    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .back-link:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .header-title { font-size: 24px; font-weight: 700; }
    .form-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      border: 1px solid var(--border-color);
      padding: 32px;
      margin-bottom: 24px;
    }
    .form-section { margin-bottom: 28px; }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .form-label .required { color: var(--accent-red); margin-left: 4px; }
    .form-hint { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    textarea.form-input { min-height: 120px; resize: vertical; line-height: 1.6; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .category-select {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .category-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .category-option:hover { border-color: var(--text-secondary); }
    .category-option.selected { border-color: var(--accent-blue); background: rgba(59, 130, 246, 0.1); }
    .category-option input { display: none; }
    .category-icon { font-size: 18px; }
    .category-name { font-size: 14px; font-weight: 500; }
    .file-upload-zone {
      border: 2px dashed var(--border-color);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .file-upload-zone:hover, .file-upload-zone.dragover {
      border-color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.05);
    }
    .file-upload-zone.has-file {
      border-style: solid;
      border-color: var(--accent-green);
      background: rgba(16, 185, 129, 0.05);
    }
    .upload-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
    .upload-text { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
    .upload-hint { font-size: 13px; color: var(--text-secondary); }
    .file-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-primary);
      border-radius: 10px;
      margin-top: 16px;
    }
    .file-icon { font-size: 32px; }
    .file-details { flex: 1; }
    .file-name { font-weight: 600; margin-bottom: 4px; }
    .file-size { font-size: 12px; color: var(--text-secondary); }
    .file-remove {
      padding: 8px;
      background: var(--bg-secondary);
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .file-remove:hover { background: var(--accent-red); color: white; }
    .tags-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      min-height: 50px;
      cursor: text;
    }
    .tags-input-wrapper:focus-within {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .tag-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--accent-blue);
      border-radius: 6px;
      font-size: 13px;
    }
    .tag-chip button {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
    }
    .tags-input {
      flex: 1;
      min-width: 120px;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }
    .submit-section {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }
    .btn {
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-family: inherit;
    }
    .btn-secondary { background: var(--bg-card); color: var(--text-primary); }
    .btn-secondary:hover { background: var(--border-color); }
    .btn-primary { background: var(--accent-blue); color: white; }
    .btn-primary:hover { background: #2563EB; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .entries-section { margin-top: 40px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 18px; font-weight: 600; }
    .entries-list { display: flex; flex-direction: column; gap: 12px; }
    .entry-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }
    .entry-icon {
      font-size: 28px;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      border-radius: 10px;
    }
    .entry-info { flex: 1; }
    .entry-title { font-weight: 600; margin-bottom: 4px; }
    .entry-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 16px; }
    .btn-icon {
      padding: 8px;
      background: var(--bg-primary);
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-icon:hover { background: var(--accent-red); color: white; }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 16px 24px;
      background: var(--accent-green);
      color: white;
      border-radius: 10px;
      font-weight: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--accent-red); }
    .data-actions { display: flex; gap: 12px; margin-top: 16px; }
    .btn-small {
      padding: 8px 16px;
      font-size: 13px;
      background: var(--bg-card);
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-small:hover { background: var(--accent-blue); color: white; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="index.html" class="back-link"><span>←</span><span>返回首页</span></a>
      <h1 class="header-title">📤 添加研究成果</h1>
    </header>

    <div class="form-card">
      <form id="entryForm">
        <div class="form-section">
          <label class="form-label">成果标题 <span class="required">*</span></label>
          <input type="text" class="form-input" id="title" placeholder="例如：SDD规范驱动开发工程实践指南" required>
        </div>
        <div class="form-row">
          <div class="form-section">
            <label class="form-label">主题分类 <span class="required">*</span></label>
            <div class="category-select" id="categorySelect"></div>
          </div>
          <div class="form-section">
            <label class="form-label">发布日期 <span class="required">*</span></label>
            <input type="date" class="form-input" id="date" required>
          </div>
        </div>
        <div class="form-section">
          <label class="form-label">成果描述 <span class="required">*</span></label>
          <textarea class="form-input" id="description" placeholder="简要描述这份研究成果的核心内容和价值..." required></textarea>
        </div>
        <div class="form-section">
          <label class="form-label">标签（回车添加）</label>
          <div class="tags-input-wrapper" id="tagsWrapper">
            <input type="text" class="tags-input" id="tagsInput" placeholder="输入标签后按回车">
          </div>
          <p class="form-hint">添加相关标签便于搜索，如：AI、SDD、金融、数据分析</p>
        </div>
        <div class="form-section">
          <label class="form-label">HTML 文件 <span class="required">*</span></label>
          <div class="file-upload-zone" id="dropZone">
            <div class="upload-icon">📄</div>
            <div class="upload-text">拖拽 HTML 文件到此处，或点击选择</div>
            <div class="upload-hint">支持 .html 文件</div>
          </div>
          <input type="file" id="fileInput" accept=".html" style="display: none;">
          <div id="filePreview" class="file-info" style="display: none;">
            <div class="file-icon">🌐</div>
            <div class="file-details">
              <div class="file-name" id="fileName"></div>
              <div class="file-size" id="fileSize"></div>
            </div>
            <button type="button" class="file-remove" id="removeFile">×</button>
          </div>
        </div>
        <div class="submit-section">
          <button type="button" class="btn btn-secondary" id="resetBtn">重置</button>
          <button type="submit" class="btn btn-primary" id="submitBtn">添加到 data.json</button>
        </div>
      </form>
    </div>

    <div class="form-card">
      <div class="form-section">
        <label class="form-label">data.json 数据文件</label>
        <p class="form-hint">点击下方按钮下载更新后的 data.json，然后替换 GitHub 仓库中的文件完成同步</p>
        <div class="data-actions">
          <button type="button" class="btn-small" id="downloadData">📥 下载 data.json</button>
        </div>
      </div>
    </div>

    <section class="entries-section">
      <div class="section-header">
        <h2 class="section-title">📋 现有成果</h2>
      </div>
      <div class="entries-list" id="entriesList"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let siteData = { categories: [], entries: [] };
    let selectedCategory = '';
    let selectedFile = null;
    let tags = [];

    async function loadData() {
      try {
        const response = await fetch('data.json');
        siteData = await response.json();
        init();
      } catch (e) { showToast('加载数据失败：' + e.message, true); }
    }

    function init() {
      renderCategorySelect();
      renderEntriesList();
      setDefaultDate();
      setupEventListeners();
    }

    function setDefaultDate() {
      document.getElementById('date').value = new Date().toISOString().split('T')[0];
    }

    function renderCategorySelect() {
      const container = document.getElementById('categorySelect');
      container.innerHTML = siteData.categories.map(cat => `
        <label class="category-option" data-value="${cat.id}">
          <input type="radio" name="category" value="${cat.id}">
          <span class="category-icon">${cat.icon}</span>
          <span class="category-name">${cat.name}</span>
        </label>
      `).join('');

      container.querySelectorAll('.category-option').forEach(opt => {
        opt.addEventListener('click', () => {
          container.querySelectorAll('.category-option').forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          selectedCategory = opt.dataset.value;
        });
      });
    }

    function renderEntriesList() {
      const list = document.getElementById('entriesList');
      if (siteData.entries.length === 0) {
        list.innerHTML = '<p style="color: var(--text-secondary); padding: 20px;">暂无成果，添加第一个吧！</p>';
        return;
      }
      list.innerHTML = siteData.entries.map((entry, index) => {
        const cat = siteData.categories.find(c => c.id === entry.category) || { icon: '📚', name: '其他' };
        return `
          <div class="entry-item">
            <div class="entry-icon">${cat.icon}</div>
            <div class="entry-info">
              <div class="entry-title">${entry.title}</div>
              <div class="entry-meta">
                <span>📅 ${entry.date}</span>
                <span>🏷️ ${cat.name}</span>
              </div>
            </div>
            <div class="entry-actions">
              <button class="btn-icon" onclick="deleteEntry(${index})" title="删除">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function deleteEntry(index) {
      if (confirm('确定要删除这个成果吗？')) {
        siteData.entries.splice(index, 1);
        saveData();
        renderEntriesList();
        showToast('已删除');
      }
    }

    function setupEventListeners() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');

      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.html')) handleFile(file);
        else showToast('请上传 HTML 文件', true);
      });
      fileInput.addEventListener('change', (e) => { if (e.target.files[0]) handleFile(e.target.files[0]); });
      document.getElementById('removeFile').addEventListener('click', removeFile);

      const tagsInput = document.getElementById('tagsInput');
      const tagsWrapper = document.getElementById('tagsWrapper');
      tagsWrapper.addEventListener('click', () => tagsInput.focus());

      document.getElementById('entryForm').addEventListener('submit', handleSubmit);
      document.getElementById('resetBtn').addEventListener('click', resetForm);
      document.getElementById('downloadData').addEventListener('click', downloadDataFile);
    }

    function handleFile(file) {
      selectedFile = file;
      const dropZone = document.getElementById('dropZone');
      const preview = document.getElementById('filePreview');
      dropZone.classList.add('has-file');
      dropZone.style.display = 'none';
      preview.style.display = 'flex';
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('fileSize').textContent = formatFileSize(file.size);
    }

    function removeFile() {
      selectedFile = null;
      const dropZone = document.getElementById('dropZone');
      const preview = document.getElementById('filePreview');
      const fileInput = document.getElementById('fileInput');
      dropZone.classList.remove('has-file');
      dropZone.style.display = 'block';
      preview.style.display = 'none';
      fileInput.value = '';
    }

    function renderTags() {
      const tagsWrapper = document.getElementById('tagsWrapper');
      const chips = tags.map((tag, i) => `
        <span class="tag-chip">${tag}<button onclick="removeTag(${i})">×</button></span>
      `).join('');
      tagsWrapper.innerHTML = chips + '<input type="text" class="tags-input" id="tagsInput" placeholder="输入标签后按回车">';
      document.getElementById('tagsInput').focus();
      document.getElementById('tagsInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const value = e.target.value.trim();
          if (value && !tags.includes(value)) { tags.push(value); renderTags(); }
        } else if (e.key === 'Backspace' && !e.target.value && tags.length > 0) { tags.pop(); renderTags(); }
      });
    }

    function removeTag(index) { tags.splice(index, 1); renderTags(); }

    function handleSubmit(e) {
      e.preventDefault();
      if (!selectedCategory) { showToast('请选择主题分类', true); return; }
      if (!selectedFile) { showToast('请上传 HTML 文件', true); return; }
      const title = document.getElementById('title').value.trim();
      const date = document.getElementById('date').value;
      const description = document.getElementById('description').value.trim();
      const id = title.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]/g, '-').replace(/-+/g, '-');
      const newEntry = { id, title, category: selectedCategory, date, description, file: `articles/${selectedFile.name}`, tags };
      siteData.entries.push(newEntry);
      saveData();
      renderEntriesList();
      showToast('已添加到 data.json！记得下载并同步到 GitHub');
    }

    function saveData() {
      localStorage.setItem('researchSiteData', JSON.stringify(siteData, null, 2));
    }

    function resetForm() {
      document.getElementById('entryForm').reset();
      selectedCategory = '';
      selectedFile = null;
      tags = [];
      setDefaultDate();
      removeFile();
      renderTags();
      document.querySelectorAll('.category-option').forEach(o => o.classList.remove('selected'));
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function downloadDataFile() {
      const dataStr = JSON.stringify(siteData, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'data.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('data.json 已下载！');
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast' + (isError ? ' error' : '');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    loadData();
  </script>
</body>
</html>
